name: Pipeline

on:
  workflow_dispatch:        # Manual trigger only
    inputs:
      env:
        description: 'Environment to run against (dev or prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      PIPELINE_ENV: ${{ inputs.env }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull latest pipeline image
        run: |
          ECR_REPO=${{ inputs.env == 'prod' && secrets.ECR_REPO_PROD || secrets.ECR_REPO_DEV }}
          docker pull ${{ steps.login-ecr.outputs.registry }}/${ECR_REPO}:latest
          echo "IMAGE=${{ steps.login-ecr.outputs.registry }}/${ECR_REPO}:latest" >> $GITHUB_ENV

      - name: Run ingest
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_DEFAULT_REGION=eu-west-2 \
            -e ENV=${{ env.PIPELINE_ENV }} \
            ${{ env.IMAGE }} ingest

      - name: Run transform
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_DEFAULT_REGION=eu-west-2 \
            -e ENV=${{ env.PIPELINE_ENV }} \
            ${{ env.IMAGE }} transform

      - name: Run load
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_DEFAULT_REGION=eu-west-2 \
            -e ENV=${{ env.PIPELINE_ENV }} \
            ${{ env.IMAGE }} load
